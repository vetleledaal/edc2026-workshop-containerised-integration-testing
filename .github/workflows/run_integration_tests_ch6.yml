name: Run integration tests chapter 6

on:
  workflow_call:
    inputs:
      lane:
        description: "Which lane to run (dev or latest)"
        required: true
        type: string
        default: 'latest'

  workflow_dispatch:
    inputs:
      lane:
        description: "Which lane to run (dev or latest)"
        required: true
        type: string
        default: 'latest'

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: ./chapter_6

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e '.[dev]'

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -s .
