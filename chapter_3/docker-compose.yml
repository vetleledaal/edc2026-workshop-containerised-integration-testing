services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: train
      POSTGRES_PASSWORD: train
      POSTGRES_DB: train
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U train -d train"]
      interval: 2s
      timeout: 2s
      retries: 30

  api:
    build: .
    environment:
      TICKETS_DATABASE_URL: postgresql+psycopg://train:train@db:5432/train
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy